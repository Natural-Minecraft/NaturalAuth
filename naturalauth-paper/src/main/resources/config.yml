# NaturalAuth Configuration for Paper (Lobby Server)

# Set this to true ONLY on the Lobby/Auth server.
# On other servers (like School or Survival), set this to false to disable player blocking, teleportation, and automatic GUIs.
lobby-mode: true

# Schematic / Structure settings
# If true, the plugin will load and paste the lobby.nbt structure at startup
enable-schematic-loading: true

# The coordinate where the structure will be loaded and pasted (in the default world)
schematic-paste:
  world: "world"
  x: 0
  y: 100
  z: 0

# The player spawn location inside the lobby structure
spawn-location:
  world: "world"
  x: 0.5
  y: 102.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# ItemsAdder Unicode custom logo (leave empty to disable)
# Example: "\uE001" or "%ia_logo%" (if using PlaceholderAPI to resolve ItemsAdder placeholders)
LogoRPUnicode: "\uE001"
